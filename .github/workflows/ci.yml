name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: ALLOW_FIREBASE_FALLBACK_IN_PROD=true npm run build
